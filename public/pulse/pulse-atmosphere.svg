<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 220" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
  <defs>
    <linearGradient id="pulseAtmHorizon" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e7fd" stop-opacity="0.28"/>
      <stop offset="40%" stop-color="#f7a819" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00e7fd" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="pulseAtmCity" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#020508" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="pulseAtmSoftGlow" x="-5%" y="-5%" width="110%" height="110%">
